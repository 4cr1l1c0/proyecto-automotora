spring.application.name=ms-ensurances
server.port=8092

spring.datasource.url=jdbc:mysql://localhost:3306/db_ensurances?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=always

spring.flyway.enabled=true

feign.client.ms-clients.url=http://localhost:8081
feign.client.ms-vehicles.url=http://localhost:8084

logging.level.root=ERROR
logging.level.cl.duoc.ms_ensurances=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.cloud.discovery.enabled=false
eureka.client.enabled=false