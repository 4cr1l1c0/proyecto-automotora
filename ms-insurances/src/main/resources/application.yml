spring:
  application:
    name: ms-insurances
  datasource:
    url: "jdbc:mysql://localhost:3306/db_insurances?useSSL=false&serverTimezone=UTC"
    username: root
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  output:
    ansi:
      enabled: always
  flyway:
    enabled: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
    discovery:
      enabled: false

server:
  port: 9010

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

feign:
  client:
    ms-clients:
      url: http://localhost:9001
    ms-vehicles:
      url: http://localhost:9004

logging:
  level:
    root: ERROR
    cl.duoc.ms_insurances: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

eureka:
  client:
    enabled: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
