server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        - id: ms-auth
          uri: http://localhost:9011
          predicates:
            - Path=/auth/**

        - id: ms-clients
          uri: http://localhost:9001
          predicates:
            - Path=/api/v1/clients/**

        - id: ms-sales
          uri: http://localhost:9002
          predicates:
            - Path=/api/v1/sales/**

        - id: ms-employees
          uri: http://localhost:9003
          predicates:
            - Path=/api/v1/employees/**

        - id: ms-vehicles
          uri: http://localhost:9004
          predicates:
            - Path=/api/v1/vehicles/**

        - id: ms-inventory
          uri: http://localhost:9005
          predicates:
            - Path=/api/v1/inventory/**

        - id: ms-test-drive
          uri: http://localhost:9006
          predicates:
            - Path=/api/v1/test-drives/**

        - id: ms-suppliers
          uri: http://localhost:9007
          predicates:
            - Path=/api/v1/suppliers/**

        - id: ms-delivery
          uri: http://localhost:9008
          predicates:
            - Path=/api/v1/deliveries/**

        - id: ms-branches
          uri: http://localhost:9009
          predicates:
            - Path=/api/v1/branches/**

        - id: ms-insurances
          uri: http://localhost:9010
          predicates:
            - Path=/api/v1/insurances/**
