spring.application.name=ms-delivery
server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/db_delivery?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=always

spring.flyway.enabled=true


feign.url.ms-sales=http://localhost:8082
feign.url.ms-clients=http://localhost:8081
