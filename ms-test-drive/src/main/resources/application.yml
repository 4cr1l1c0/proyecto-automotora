spring:
  application:
    name: ms-test-drive
  datasource:
    url: "jdbc:mysql://localhost:3306/db_test_drive?useSSL=false&serverTimezone=UTC"
    username: root
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  output:
    ansi:
      enabled: always
  flyway:
    enabled: true
  cloud:
    discovery:
      enabled: false

server:
  port: 9006

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

logging:
  level:
    root: ERROR
    cl.duoc.ms_test_drive: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

feign:
  url:
    ms-clients: http://localhost:9001
    ms-vehicles: http://localhost:9004

eureka:
  client:
    enabled: false
