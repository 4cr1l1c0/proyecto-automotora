spring:
  application:
    name: ms-suppliers
  datasource:
    url: "jdbc:mysql://localhost:3306/db_suppliers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: root
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  output:
    ansi:
      enabled: always
  flyway:
    enabled: true
  cloud:
    discovery:
      enabled: false

server:
  port: 9007

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

logging:
  level:
    root: ERROR
    cl.duoc.ms_suppliers: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

eureka:
  client:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: "jdbc:mysql://mysql-db:3306/db_suppliers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

server:
  port: ${PORT:9007}
